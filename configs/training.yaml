train_ratio: 0.7
validation_ratio: 0.15

regression:
  poisson:
    alpha: 0.1
    max_iter: 1000
  ridge:
    alpha: 1.0

lightgbm:
  n_estimators: 400
  learning_rate: 0.03
  num_leaves: 31
  subsample: 0.8
  colsample_bytree: 0.8
  min_child_samples: 25
  early_stopping_rounds: 40

hist_gradient_boosting:
  learning_rate: 0.05
  max_iter: 250
  l2_regularization: 0.01

sarimax:
  order: [1, 0, 0]
  seasonal_order: [1, 0, 0, 24]
  maxiter: 25
